<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#1F2B5B">
  <title>MathClicks — IGCSE &amp; SAT Math</title>
  <script>
    /* Apply saved theme before first paint to avoid a flash */
    try {
      var t = localStorage.getItem("mathclicks.theme");
      if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches))
        document.documentElement.dataset.theme = "dark";
    } catch (e) {}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/style.css?v=7">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body>

  <div id="site">
    <header class="topnav">
      <div class="topnav-inner">
        <a href="#/" class="brand" aria-label="MathClicks home">
          <svg class="brand-logo" viewBox="0 0 40 40" width="32" height="32" aria-hidden="true">
            <rect x="1" y="1" width="38" height="38" rx="11" fill="#1F2B5B"/>
            <text x="19" y="28" text-anchor="middle" font-family="Nunito, sans-serif" font-weight="900" font-size="21" fill="#ffffff">M</text>
            <g stroke="#FF6B5C" stroke-width="2.6" stroke-linecap="round">
              <line x1="30" y1="10.5" x2="33.5" y2="7"/>
              <line x1="31.5" y1="15.5" x2="36.5" y2="14.5"/>
              <line x1="25.5" y1="8.5" x2="26.5" y2="3.5"/>
            </g>
          </svg>
          <span class="brand-name">Math<span class="brand-accent">Clicks</span></span>
        </a>
        <div class="nav-tools">
          <button id="exam-chip" class="tool-chip" type="button" title="Set your exam date">📅 <span id="exam-chip-label">My exam date</span></button>
          <button id="theme-toggle" class="tool-chip tool-icon" type="button" aria-label="Toggle dark mode">🌙</button>
        </div>
      </div>
    </header>

    <!-- "What do you need right now?" quick actions -->
    <div class="need-bar">
      <div class="need-inner">
        <span class="need-label">What do you need right now?</span>
        <div class="need-btns">
          <button id="need-trick" class="need-btn nb-trick" type="button">⚡ Quick Trick</button>
          <button id="need-resume" class="need-btn nb-resume" type="button">▶ Resume Topic</button>
          <button id="need-new" class="need-btn nb-new" type="button">📚 Start Something New</button>
        </div>
      </div>
    </div>

    <main id="main" data-view="home"></main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-brand">
          <span class="brand-name">Math<span class="brand-accent">Clicks</span> <span class="by-line">by Hamouda</span></span>
          <p class="footer-tag">IGCSE &amp; SAT math, one click at a time.</p>
        </div>
        <div class="footer-social">
          <a class="social-btn" href="https://www.youtube.com/channel/UC6QrK419Gg5w1SXzlBbYXCw" target="_blank" rel="noopener">
            <span aria-hidden="true">▶</span> YouTube
          </a>
          <a class="social-btn" href="https://www.tiktok.com/@apple.user3799222" target="_blank" rel="noopener">
            <span aria-hidden="true">♪</span> TikTok
          </a>
        </div>
      </div>
      <p class="footer-small">© 2026 MATHCLICKS BY HAMOUDA · IGCSE &amp; SAT math, one click at a time</p>
    </footer>
  </div>

  <!-- Floating formula-sheet button + slide-out panel -->
  <button id="fab" class="fab" type="button" aria-label="Open formula sheet">
    <span aria-hidden="true">📐</span><span class="fab-label">Formulas</span>
  </button>
  <div id="fpanel-backdrop" class="fpanel-backdrop hidden"></div>
  <aside id="fpanel" class="fpanel" aria-label="Formula sheet" aria-hidden="true">
    <div class="fpanel-head">
      <strong>📐 Formula Sheet</strong>
      <button id="fpanel-close" class="icon-close" type="button" aria-label="Close formula sheet">✕</button>
    </div>
    <div id="fpanel-body" class="fpanel-body"></div>
  </aside>

  <!-- Generic modal (tricks, exam date) -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-panel">
      <button id="modal-close" class="icon-close" type="button" aria-label="Close">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script defer src="js/app.js?v=8"></script>
</body>
</html>
