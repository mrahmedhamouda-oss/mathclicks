<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>10SAT Math Practice</title>
  <link rel="stylesheet" href="css/style.css?v=4">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body>

  <!-- Passcode gate -->
  <div id="gate" class="gate hidden">
    <div class="gate-card">
      <div class="gate-logo">🎯</div>
      <h1>10SAT Math Practice</h1>
      <p>Enter the class passcode to continue.</p>
      <form id="gate-form">
        <input type="password" id="gate-input" inputmode="text" autocomplete="off"
               placeholder="Passcode" aria-label="Passcode">
        <button type="submit" class="btn btn-primary">Enter</button>
      </form>
      <p id="gate-error" class="gate-error hidden">That passcode isn't right — check with your teacher.</p>
    </div>
  </div>

  <!-- Site -->
  <div id="site" class="hidden">
    <header class="site-header">
      <div class="header-inner">
        <a href="#/modules" class="site-title">🎯 10SAT Math Practice</a>
        <p class="site-sub">Watch the explanation, then test your understanding — lesson by lesson.</p>
      </div>
    </header>
    <main id="main"></main>
    <footer class="site-footer">Algebra 2 &amp; Geometry · American Pathway · 2026–2027</footer>
  </div>

  <script defer src="js/app.js?v=4"></script>
</body>
</html>
