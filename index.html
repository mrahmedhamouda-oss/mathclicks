<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#1F2B5B">
  <title>MathClicks — IGCSE &amp; SAT Math</title>
  <script>
    /* Apply saved theme before first paint to avoid a flash */
    try {
      var t = localStorage.getItem("mathclicks.theme");
      if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches))
        document.documentElement.dataset.theme = "dark";
    } catch (e) {}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/style.css?v=11">
  <link rel="icon" type="image/png" href="assets/mathclicks-icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body>

  <div id="site">
    <header class="topnav">
      <div class="topnav-inner">
        <a href="#/" class="brand" aria-label="MathClicks home">
          <img class="brand-logo" src="assets/mathclicks-icon.png" width="34" height="34" alt="" aria-hidden="true">
          <span class="brand-name"><span class="bn-math">Math</span><span class="bn-clicks">Clicks</span></span>
        </a>
        <div class="nav-tools">
          <nav class="nav-links" aria-label="Main navigation">
            <a class="nav-link" data-nav="home" href="#/">Home</a>
            <a class="nav-link" data-nav="topics" href="#/modules">Topics</a>
            <a class="nav-link" data-nav="about" href="#/about">About</a>
          </nav>
          <button id="exam-chip" class="tool-chip" type="button" title="Set your exam date">📅 <span id="exam-chip-label">Exam date</span></button>
          <button id="theme-toggle" class="tool-chip tool-icon" type="button" aria-label="Toggle dark mode">🌙</button>
          <button id="nav-search" class="tool-chip" type="button" aria-label="Search lessons">
            🔍 <span class="nav-search-label">Search</span>
          </button>
        </div>
      </div>
    </header>

    <main id="main" data-view="home"></main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-brand">
          <img class="footer-logo" src="assets/mathclicks-logo.png" alt="MathClicks" width="150">
          <p class="footer-tag">IGCSE &amp; American Pathway math, one click at a time.</p>
        </div>
        <div class="footer-social">
          <a class="social-btn" href="https://www.youtube.com/channel/UC6QrK419Gg5w1SXzlBbYXCw" target="_blank" rel="noopener">
            <span aria-hidden="true">▶</span> YouTube
          </a>
          <a class="social-btn" href="https://www.tiktok.com/@apple.user3799222" target="_blank" rel="noopener">
            <span aria-hidden="true">♪</span> TikTok
          </a>
        </div>
      </div>
      <p class="footer-small">© 2026 MATHCLICKS BY HAMOUDA · IGCSE &amp; American Pathway math, one click at a time</p>
    </footer>
  </div>

  <!-- Lesson search overlay -->
  <div id="search-overlay" class="search-overlay hidden" role="dialog" aria-modal="true" aria-label="Search lessons">
    <div class="search-panel">
      <div class="search-bar">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input id="search-input" type="search" placeholder="Search lessons — try “quadratic”" autocomplete="off" aria-label="Search lessons">
        <button id="search-close" class="search-close" type="button" aria-label="Close search">✕</button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>
  </div>

  <!-- Floating action buttons (stacked bottom-right) -->
  <div class="fab-stack">
    <button id="fab" class="fab fab-formula" type="button" aria-label="Open formula sheet">
      <span aria-hidden="true">📐</span><span class="fab-label">Formulas</span>
    </button>
    <button id="ask-fab" class="fab fab-ask" type="button" aria-label="Ask Mr Hamouda a math question">
      <span class="ask-avatar" aria-hidden="true">🧑🏻‍🏫</span><span class="fab-label">Ask Mr Hamouda</span>
    </button>
  </div>

  <!-- Formula-sheet slide-out panel -->
  <div id="fpanel-backdrop" class="fpanel-backdrop hidden"></div>
  <aside id="fpanel" class="fpanel" aria-label="Formula sheet" aria-hidden="true">
    <div class="fpanel-head">
      <strong>📐 Formula Sheet</strong>
      <button id="fpanel-close" class="icon-close" type="button" aria-label="Close formula sheet">✕</button>
    </div>
    <div id="fpanel-body" class="fpanel-body"></div>
  </aside>

  <!-- Ask Mr Hamouda chat -->
  <div id="chat-backdrop" class="chat-backdrop hidden"></div>
  <section id="chat" class="chat" aria-label="Ask Mr Hamouda" aria-hidden="true">
    <div class="chat-head">
      <span class="chat-avatar" aria-hidden="true">🧑🏻‍🏫</span>
      <div class="chat-id">
        <strong>Mr Hamouda</strong>
        <span class="chat-status"><span class="chat-dot"></span> Math tutor · online</span>
      </div>
      <button id="chat-close" class="icon-close" type="button" aria-label="Close chat">✕</button>
    </div>
    <div id="chat-log" class="chat-log" role="log" aria-live="polite"></div>
    <div id="chat-chips" class="chat-chips"></div>
    <form id="chat-form" class="chat-form">
      <input id="chat-input" type="text" autocomplete="off" placeholder="Ask a math question…" aria-label="Ask a math question">
      <button type="submit" class="chat-send" aria-label="Send">➤</button>
    </form>
  </section>

  <!-- Generic modal (tricks, exam date) -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-panel">
      <button id="modal-close" class="icon-close" type="button" aria-label="Close">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script defer src="js/app.js?v=11"></script>
</body>
</html>
